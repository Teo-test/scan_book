<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Bibliothèque</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<header>
  <div class="logo">Ma <span>Bibliothèque</span></div>
  <div class="header-stats">
    <div><strong id="stat-total">0</strong>Livres</div>
    <div><strong id="stat-authors">0</strong>Auteurs</div>
    <div><strong id="stat-genres">0</strong>Genres</div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="section-title">Scanner un livre</div>
    <div class="scan-box">
      <!-- Upload photo (fonctionne sans HTTPS) -->
      <div class="upload-zone" onclick="document.getElementById('photo-input').click()">
        <div class="upload-icon">📸</div>
        <div>Prendre / importer une photo du code-barres</div>
        <div style="font-size:0.62rem;margin-top:4px;color:var(--muted)">Fonctionne partout • sans serveur</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="scanPhotoFile(this)">

      <!-- Caméra live (HTTPS ou localhost uniquement) -->
      <div id="reader"></div>
      <button class="btn btn-secondary" id="btn-scan" onclick="toggleCamera()" style="margin-bottom:8px">📷 Caméra live (HTTPS requis)</button>
      <button class="btn btn-danger" id="btn-stop" onclick="stopCamera()" style="display:none;margin-bottom:8px">⏹ Arrêter la caméra</button>

      <div class="isbn-row">
        <input type="text" id="isbn-input" placeholder="ISBN manuel..." maxlength="17">
        <button class="btn btn-secondary" onclick="lookupIsbn()">→</button>
      </div>
      <div id="loading-api" class="loading-indicator">
        <div class="spinner"></div> Recherche en cours…
      </div>
    </div>

    <div id="book-form">
      <div class="section-title">Informations du livre</div>
      <div class="form-group">
        <label>Titre *</label>
        <input type="text" id="f-title" placeholder="Titre du livre">
      </div>
      <div class="form-group">
        <label>Auteur(s) *</label>
        <input type="text" id="f-author" placeholder="Nom, Prénom">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Éditeur</label>
          <input type="text" id="f-publisher" placeholder="Maison d'édition">
        </div>
        <div class="form-group">
          <label>Année</label>
          <input type="text" id="f-year" placeholder="2024">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Genre / Type</label>
          <select id="f-genre">
            <option value="">— Choisir —</option>
            <option>Roman</option>
            <option>Science-Fiction</option>
            <option>Fantasy</option>
            <option>Policier / Thriller</option>
            <option>Biographie</option>
            <option>Histoire</option>
            <option>Sciences</option>
            <option>Philosophie</option>
            <option>Développement personnel</option>
            <option>Art & Design</option>
            <option>Cuisine</option>
            <option>Jeunesse</option>
            <option>Bande dessinée</option>
            <option>Manga</option>
            <option>Poésie</option>
            <option>Essai</option>
            <option>Informatique</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Langue</label>
          <select id="f-lang">
            <option value="">—</option>
            <option>Français</option>
            <option>Anglais</option>
            <option>Espagnol</option>
            <option>Allemand</option>
            <option>Italien</option>
            <option>Autre</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Pages</label>
          <input type="number" id="f-pages" placeholder="0">
        </div>
        <div class="form-group">
          <label>ISBN</label>
          <input type="text" id="f-isbn" placeholder="978…">
        </div>
      </div>
      <div class="form-group">
        <label>Catégorie perso</label>
        <div class="cat-picker">
          <select id="f-category">
            <option value="">— Aucune —</option>
          </select>
          <button type="button" class="btn btn-secondary cat-new-btn" onclick="newCategory()" title="Créer une nouvelle catégorie">+</button>
        </div>
      </div>
      <div class="form-group">
        <label>Note (0–5)</label>
        <input type="number" id="f-rating" placeholder="—" min="0" max="5" step="0.5">
      </div>
      <div class="form-group">
        <label>Résumé</label>
        <textarea id="f-desc" placeholder="Description…"></textarea>
      </div>
      <input type="hidden" id="f-cover">
      <input type="hidden" id="f-edit-index" value="-1">
      <button class="btn btn-primary" onclick="saveBook()" style="margin-top:4px">✓ Enregistrer le livre</button>
      <button class="btn btn-secondary" onclick="resetForm()">✕ Annuler</button>
    </div>

    <div style="margin-top:24px">
      <div class="section-title">Catégories</div>
      <div class="cat-list" id="cat-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="filters">
      <input type="text" id="search-input" placeholder="Rechercher un titre, auteur…" oninput="renderGrid()">
      <select id="filter-genre" onchange="renderGrid()">
        <option value="">Tous les genres</option>
      </select>
      <select id="filter-year" onchange="renderGrid()">
        <option value="">Toutes les années</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="view-grid-btn" onclick="setView('grid')" title="Vue grille">▦</button>
        <button class="view-btn" id="view-list-btn" onclick="setView('list')" title="Vue liste">☰</button>
      </div>
      <div class="export-bar">
        <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
        <button class="export-btn" onclick="exportJSON()">↓ JSON</button>
        <button class="export-btn" onclick="exportSQL()">↓ SQL</button>
      </div>
    </div>
    <div id="book-grid"></div>
  </main>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
